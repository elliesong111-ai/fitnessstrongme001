<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>体重追踪 - 健康塑形</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F3F6F2;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:16px;max-width:960px;margin:0 auto;color:#222}
.card{background:#fff;border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:0 1px 3px #00000010}
h2{font-size:17px;margin-bottom:12px;font-weight:600}
.ctrl-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.tab{padding:6px 12px;border-radius:99px;border:1px solid #ccc;background:#fff;cursor:pointer;font-size:14px;transition:all .15s}
.tab.active{background:#2F6B4F;color:#fff;border-color:#2F6B4F}
input,select{padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:14px}
button{padding:7px 12px;border-radius:8px;border:none;cursor:pointer;font-size:14px;transition:opacity .15s}
button:hover{opacity:.85}
.btn-main{background:#2F6B4F;color:#fff}
.btn-gray{background:#f0f0f0;color:#333}
.btn-sm{padding:4px 10px;font-size:12px}
.form-item{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.label{font-size:12px;color:#888;font-weight:500}
.pill{display:inline-block;padding:4px 10px;border-radius:99px;font-size:12px;margin-right:6px;margin-bottom:4px}
.pill-green{background:#d6f2e3;color:#227043}
.pill-blue{background:#e1ecff;color:#2a5cb8}
.pill-orange{background:#fce8d8;color:#c26c38}
.pill-red{background:#fde2e2;color:#c0392b}
.pill-gray{background:#f0f0f0;color:#666}
canvas{width:100%;height:240px;background:#fff;border-radius:8px;margin:10px 0}
table{width:100%;border-collapse:collapse;margin-top:8px}
td,th{padding:8px 6px;border-top:1px solid #f0f0f0;text-align:left;font-size:13px}
th{color:#888;font-weight:500}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:8px 18px;border-radius:99px;z-index:999;font-size:14px;box-shadow:0 4px 12px #0003}
footer{text-align:center;margin-top:20px;font-size:12px;color:#aaa}

/* ====== 封面大字 ====== */
.cover{background:linear-gradient(135deg,#2F6B4F 0%,#3d8a68 60%,#4fa37a 100%);color:#fff;border-radius:18px;padding:24px 20px;margin-bottom:14px;position:relative;overflow:hidden}
.cover.danger{background:linear-gradient(135deg,#c0392b 0%,#e74c3c 60%,#d35400 100%)}
.cover.warning{background:linear-gradient(135deg,#c26c38 0%,#e67e22 60%,#f39c12 100%)}
.cover::after{content:"";position:absolute;right:-30px;top:-30px;width:160px;height:160px;border-radius:50%;background:#ffffff10}
.cover-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.cover-weight{flex:1}
.cover-date{font-size:12px;opacity:.85;margin-bottom:4px}
.cover-num{font-size:52px;font-weight:800;line-height:1;letter-spacing:-1px}
.cover-unit{font-size:20px;font-weight:400;opacity:.8;margin-left:2px}
.cover-diff{font-size:13px;opacity:.95;margin-top:6px;line-height:1.5}
.cover-shape{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px}
.cover-shape svg{filter:drop-shadow(0 2px 6px #0002)}
.cover-shape-label{font-size:11px;opacity:.85;background:#ffffff22;padding:2px 10px;border-radius:99px}
.cover-stats{display:flex;gap:10px;margin-top:16px}
.cover-stat{flex:1;background:#ffffff18;border-radius:10px;padding:10px;text-align:center}
.cover-stat-val{font-size:20px;font-weight:700}
.cover-stat-label{font-size:11px;opacity:.8;margin-top:2px}
.cover-progress{margin-top:14px}
.cover-bar{height:6px;background:#ffffff25;border-radius:3px;overflow:hidden}
.cover-bar-fill{height:100%;background:#fff;border-radius:3px;transition:width .5s}
.cover-bar-text{font-size:11px;opacity:.8;margin-top:4px;text-align:right}

/* ====== 健康评估卡片 ====== */
.health-alert{border-radius:12px;padding:14px 16px;margin-bottom:14px;display:flex;gap:12px;align-items:flex-start}
.health-alert.danger{background:linear-gradient(135deg,#fff5f5,#ffe5e5);border-left:4px solid #e74c3c}
.health-alert.warning{background:linear-gradient(135deg,#fffbf0,#fef3d7);border-left:4px solid #f39c12}
.health-alert.good{background:linear-gradient(135deg,#f0faf4,#e0f5e8);border-left:4px solid #27ae60}
.health-icon{font-size:28px;flex-shrink:0;line-height:1}
.health-content{flex:1}
.health-title{font-size:15px;font-weight:700;margin-bottom:4px}
.health-alert.danger .health-title{color:#c0392b}
.health-alert.warning .health-title{color:#d68910}
.health-alert.good .health-title{color:#1e8449}
.health-bmi{font-size:12px;color:#888;margin-bottom:6px}
.health-desc{font-size:13px;color:#555;line-height:1.6}
.health-risks{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
.risk-tag{font-size:11px;padding:3px 8px;border-radius:6px;background:#ffffffcc;color:#c0392b}
.health-action{margin-top:8px;font-size:12px;color:#2F6B4F;font-weight:600}

/* ====== 身材选择器 ====== */
.shape-picker{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 4px}
.shape-card{display:flex;flex-direction:column;align-items:center;padding:8px 6px 6px;border:2px solid #e8e8e8;border-radius:12px;cursor:pointer;background:#fafafa;transition:all .15s;min-width:64px;user-select:none}
.shape-card:hover{border-color:#2F6B4F66;background:#f0f7f3}
.shape-card.selected{border-color:#2F6B4F;background:#e8f3ec;box-shadow:0 0 0 2px #2F6B4F22}
.shape-card svg{display:block}
.shape-card .shape-name{font-size:11px;margin-top:3px;color:#333;font-weight:500}
.shape-card .shape-bmi{font-size:9px;color:#999}

/* ====== 进度可视化 ====== */
.progress-visual{display:flex;align-items:center;justify-content:center;gap:16px;padding:16px 0 8px}
.progress-figure{position:relative;display:flex;flex-direction:column;align-items:center;transition:all .4s}
.progress-figure .fig-label{font-size:11px;color:#888;margin-top:4px;text-align:center}
.progress-figure .fig-weight{font-size:12px;font-weight:600;color:#333}
.fig-current{transform-origin:bottom center;opacity:.5}
.fig-target{opacity:1}
.progress-arrow{font-size:24px;color:#2F6B4F;font-weight:700}
.progress-detail{text-align:center;font-size:13px;color:#666;margin-top:8px;line-height:1.6}
.progress-detail strong{color:#2F6B4F;font-size:16px}

/* ====== BMI标尺 ====== */
.bmi-scale{margin:12px 0 4px}
.bmi-bar{height:14px;border-radius:7px;background:linear-gradient(to right,#5dade2 0%,#5dade2 18%,#58d68d 18%,#58d68d 45%,#f7dc6f 45%,#f7dc6f 60%,#f0b27a 60%,#f0b27a 75%,#ec7063 75%,#ec7063 100%);position:relative}
.bmi-pointer{position:absolute;top:-4px;width:4px;height:22px;background:#222;border-radius:2px;transform:translateX(-50%);transition:left .5s}
.bmi-labels{display:flex;justify-content:space-between;font-size:10px;color:#999;margin-top:4px}
.bmi-labels span{text-align:center;flex:1}
.bmi-labels span.active{color:#222;font-weight:600}

/* ====== 三餐推荐 ====== */
.meal-day{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
.meal-card{flex:1;min-width:120px;background:#fafafa;border-radius:10px;padding:12px;border:1px solid #f0f0f0}
.meal-card.protein{border-left:3px solid #e74c3c}
.meal-card.carbs{border-left:3px solid #f39c12}
.meal-card.veg{border-left:3px solid #27ae60}
.meal-type{font-size:11px;color:#888;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.meal-icon{font-size:16px}
.meal-name{font-size:14px;font-weight:600;color:#333;margin-bottom:4px}
.meal-desc{font-size:11px;color:#999;line-height:1.4;margin-bottom:6px}
.meal-macros{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.macro-tag{font-size:10px;padding:2px 6px;border-radius:4px;background:#f0f0f0;color:#666}
.macro-tag.protein{background:#fde8e8;color:#c0392b}
.macro-tag.carbs{background:#fef3d7;color:#d68910}
.macro-tag.fat{background:#fce8d8;color:#c26c38}
.macro-tag.cal{background:#e8f3ec;color:#227043;font-weight:600}
.meal-cal{font-size:12px;color:#c26c38;font-weight:600}
.meal-actions{margin-top:6px;display:flex;gap:4px}

/* ====== 卡路里计算器 ====== */
.calc-section{margin-top:8px}
.calc-input-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.calc-input-row label{font-size:13px;color:#555;min-width:50px}
.calc-input-row input{flex:1;min-width:80px;padding:6px 8px;font-size:13px}
.calc-input-row .unit{font-size:12px;color:#999}
.calc-result{background:linear-gradient(135deg,#f0f7f3,#e8f3ec);border-radius:10px;padding:14px;margin-top:10px}
.calc-result-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13px}
.calc-result-row.big{font-size:22px;font-weight:700;padding:8px 0}
.calc-result-row.big .val{color:#2F6B4F}
.calc-result-row.big.over .val{color:#d03333}
.calc-bar{height:8px;background:#e0e0e0;border-radius:4px;overflow:hidden;margin:8px 0}
.calc-bar-fill{height:100%;border-radius:4px;transition:width .3s}
.calc-tip{font-size:11px;color:#888;text-align:center;margin-top:6px;line-height:1.5}

/* ====== 每日建议数字 ====== */
.daily-targets{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.daily-target{flex:1;min-width:90px;background:#f8faf9;border-radius:10px;padding:10px;text-align:center}
.daily-target .dt-val{font-size:18px;font-weight:700;color:#2F6B4F}
.daily-target .dt-label{font-size:10px;color:#999;margin-top:2px}

/* ====== 健康进步指数排名 ====== */
.ranking-card{padding:16px}
.ranking-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.ranking-title h2{margin:0}
.ranking-subtitle{font-size:11px;color:#999}
.rank-list{display:flex;flex-direction:column;gap:10px}
.rank-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;background:#fafafa;transition:all .15s;cursor:pointer}
.rank-item:hover{background:#f0f7f3}
.rank-item.active{background:linear-gradient(135deg,#f0f7f3,#e8f3ec);border:1px solid #2F6B4F44}
.rank-medal{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;flex-shrink:0}
.rank-1 .rank-medal{background:linear-gradient(135deg,#FFD700,#FFA500);color:#fff;box-shadow:0 2px 8px #ffd70055}
.rank-2 .rank-medal{background:linear-gradient(135deg,#C0C0C0,#A0A0A0);color:#fff;box-shadow:0 2px 8px #c0c0c055}
.rank-3 .rank-medal{background:linear-gradient(135deg,#CD7F32,#A0522D);color:#fff;box-shadow:0 2px 8px #cd7f3255}
.rank-other .rank-medal{background:#f0f0f0;color:#999;font-size:14px}
.rank-info{flex:1;min-width:0}
.rank-name-row{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.rank-name{font-size:15px;font-weight:600}
.rank-grade{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:700}
.grade-S{background:linear-gradient(135deg,#FFD700,#FFA500);color:#fff}
.grade-A{background:#27ae60;color:#fff}
.grade-B{background:#2F6B4F;color:#fff}
.grade-C{background:#f39c12;color:#fff}
.grade-D{background:#e67e22;color:#fff}
.grade-E{background:#e74c3c;color:#fff}
.grade---{background:#ccc;color:#fff}
.rank-status{font-size:11px;color:#888}
.rank-score{text-align:right;flex-shrink:0}
.rank-score-num{font-size:24px;font-weight:800;color:#2F6B4F;line-height:1}
.rank-score-label{font-size:10px;color:#999;margin-top:2px}
.rank-bar{height:4px;background:#e8e8e8;border-radius:2px;margin-top:6px;overflow:hidden}
.rank-bar-fill{height:100%;border-radius:2px;background:#2F6B4F;transition:width .5s}
.rank-avatar{flex-shrink:0;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#fff;border:2px solid #e0e0e0;overflow:hidden}
.rank-dims{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.rank-dim{font-size:9px;padding:1px 5px;border-radius:4px;background:#fff;color:#888}

/* ====== HPI依据弹窗 ====== */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#0005;z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:#fff;border-radius:14px;max-width:520px;width:100%;max-height:80vh;overflow-y:auto;padding:20px;box-shadow:0 8px 30px #0003}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modal-hdr h3{font-size:17px;margin:0}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:#999;padding:0 4px}
.modal-close:hover{color:#333}
.modal-section{margin-bottom:14px}
.modal-section h4{font-size:14px;margin:0 0 6px;color:#2F6B4F}
.modal-section p{font-size:13px;line-height:1.7;color:#444;margin:0}
.modal-section ul{margin:4px 0 0 18px;padding:0}
.modal-section li{font-size:13px;line-height:1.7;color:#444}
.modal-cite{font-size:11px;color:#999;margin-top:4px}
.hpi-source-link{cursor:pointer;border-bottom:1px dashed #999;color:#2F6B4F;font-size:11px}
.hpi-source-link:hover{color:#1a4a35}

/* ====== 饮食/运动记录 ====== */
.log-section{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:640px){.log-section{grid-template-columns:1fr}}
.log-card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 2px #00000a10}
.log-card h3{font-size:15px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.log-input-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.log-input-row input{flex:1;min-width:100px;padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px}
.log-input-row input[type=number]{max-width:100px}
.log-btn{padding:8px 12px;border-radius:8px;border:none;cursor:pointer;font-size:13px;white-space:nowrap}
.log-btn-cam{background:#f0f0f0;color:#333}
.log-btn-add{background:#2F6B4F;color:#fff}
.log-preview{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px;color:#666}
.log-preview img{width:48px;height:48px;object-fit:cover;border-radius:8px;border:1px solid #eee}
.log-match{background:#f0f7f3;border-radius:8px;padding:6px 10px;font-size:12px;color:#2F6B4F;margin-bottom:8px}
.log-list{max-height:180px;overflow-y:auto}
.log-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid #f0f0f0;font-size:13px}
.log-item:first-child{border-top:none}
.log-item img{width:36px;height:36px;object-fit:cover;border-radius:6px;flex-shrink:0}
.log-item-info{flex:1;min-width:0}
.log-item-name{font-weight:500;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-item-meta{font-size:11px;color:#999}
.log-item-kcal{font-weight:600;color:#2F6B4F;flex-shrink:0}
.log-item-del{background:none;border:none;color:#ccc;cursor:pointer;font-size:16px;padding:0 4px}
.log-item-del:hover{color:#d03333}
.log-sum{display:flex;justify-content:space-between;font-size:12px;color:#888;padding-top:8px;border-top:1px dashed #eee;margin-top:6px}
.log-sum b{color:#2F6B4F;font-size:14px}
.cal-balance{margin-top:12px;background:linear-gradient(135deg,#f0f7f3,#e8f3ec);border-radius:10px;padding:14px;display:flex;gap:12px;align-items:center}
.cal-balance-icon{font-size:28px}
.cal-balance-text{flex:1;font-size:13px;line-height:1.6}
.cal-balance-num{font-size:22px;font-weight:800;color:#2F6B4F}
.cal-balance-sub{font-size:11px;color:#888}
.file-input{display:none}
</style>
</head>
<body>
<div id="toastBox"></div>
<div id="app">加载中</div>
<script>
// ===================== 身材SVG =====================
function bodyShapePath(shapeKey){
    const paths = {
        X: "M30,32 C26,36 20,48 22,62 C24,72 28,78 30,84 C24,92 18,110 22,128 L28,128 L32,92 C34,88 36,86 40,86 C44,86 46,88 48,92 L52,128 L58,128 C62,110 56,92 50,84 C52,78 56,72 58,62 C60,48 54,36 50,32 C48,40 44,44 40,44 C36,44 32,40 30,32 Z",
        S: "M32,32 C28,38 19,52 21,66 C23,74 28,80 31,86 C24,94 17,112 23,130 L29,130 L33,92 C35,88 37,86 40,86 C43,86 45,88 47,92 L51,130 L57,130 C63,112 56,94 49,86 C52,80 57,74 59,66 C61,52 52,38 48,32 C46,42 43,46 40,46 C37,46 34,42 32,32 Z",
        H: "M28,32 C24,36 22,48 24,64 C25,76 27,82 29,86 C24,94 20,112 24,130 L30,130 L34,90 C36,86 38,85 40,85 C42,85 44,86 46,90 L50,130 L56,130 C60,112 56,94 51,86 C53,82 55,76 56,64 C58,48 56,36 52,32 C50,38 46,42 40,42 C34,42 30,38 28,32 Z",
        A: "M34,32 C31,36 26,48 27,62 C28,72 30,80 33,86 C26,96 20,114 22,130 L28,130 L33,92 C36,88 38,86 40,86 C42,86 44,88 47,92 L52,130 L58,130 C60,114 54,96 47,86 C50,80 53,72 54,62 C54,48 49,36 46,32 C44,40 42,43 40,43 C38,43 36,40 34,32 Z",
        O: "M28,32 C22,38 16,56 18,72 C20,86 26,94 30,98 C25,106 22,118 26,130 L32,130 L35,98 C37,96 39,95 40,95 C41,95 43,96 45,98 L48,130 L54,130 C58,118 55,106 50,98 C54,94 60,86 62,72 C64,56 58,38 52,32 C50,40 46,44 40,44 C34,44 30,40 28,32 Z"
    };
    return paths[shapeKey] || paths.X;
}

function shapeSvg(shapeKey, size, fillColor, scale){
    const bodyPath = bodyShapePath(shapeKey);
    const s = size || 80;
    const h = Math.round(s * 1.75);
    const fill = fillColor || "#2F6B4F";
    const sc = scale || 1;
    const scAttr = sc!==1?` transform="translate(40,150) scale(${sc}) translate(-40,-150)"`:"";
    return `<svg width="${s}" height="${h}" viewBox="0 0 80 150" xmlns="http://www.w3.org/2000/svg">
  <circle cx="40" cy="18" r="11" fill="${fill}"${scAttr}/>
  <path d="${bodyPath}" fill="${fill}"${scAttr}/>
</svg>`;
}

// ===================== BMI & 健康评估 =====================
function calcBMI(weight, heightCm){
    const h = heightCm/100;
    return +(weight/(h*h)).toFixed(1);
}

function getBMIInfo(bmi){
    if(bmi<18.5) return {level:"偏瘦",label:"thin",color:"#5dade2",risk:["免疫力下降","贫血风险","骨质疏松","月经不调(女)"],action:"建议适当增加营养摄入，增加力量训练增肌"};
    if(bmi<24) return {level:"正常",label:"good",color:"#27ae60",risk:[],action:"身材标准，继续保持健康饮食和规律运动"};
    if(bmi<28) return {level:"超重",label:"warning",color:"#f39c12",risk:["脂肪肝风险","血脂异常","高血压前期","关节负担加重"],action:"建议控制饮食热量，每周3-5次有氧运动，每次40分钟"};
    if(bmi<32) return {level:"肥胖",label:"danger",color:"#e67e22",risk:["高血压","高血脂","2型糖尿病","睡眠呼吸暂停","心血管疾病风险"],action:"必须控制饮食！每日热量缺口500kcal，每周运动5次以上"};
    return {level:"重度肥胖",label:"danger",color:"#c0392b",risk:["高血压","糖尿病","冠心病","脑卒中风险","关节严重损伤","脂肪肝","多种癌症风险"],action:"强烈建议就医，在专业指导下进行减重，严格控制饮食"};
}

// ===================== 个性化营养推荐 =====================
// 基于年龄、性别、体重、身高、活动水平计算TDEE和目标热量
// targetMode: lose(减脂) / shape(塑形增肌,BMI正常) / gain(增重,BMI偏瘦)
function calcNutrition(weight, heightCm, age, sex, targetMode){
    const bmr = sex==="男"
        ? Math.round(10*weight + 6.25*heightCm - 5*age + 5)
        : Math.round(10*weight + 6.25*heightCm - 5*age - 161);
    // 轻度活动系数1.375，运动日1.55
    const activityFactor = targetMode==="shape"?1.55:1.375;
    const tdee = Math.round(bmr * activityFactor);
    let targetCal, proteinG, fatG, carbG, mode, water, steps, sleep, tips;

    if(targetMode==="lose"){
        // 安全减脂：热量缺口300-500kcal，不低于基础代谢
        targetCal = Math.max(bmr, tdee - 500);
        proteinG = Math.round(weight * 2.0);  // 高蛋白保护肌肉
        fatG = Math.round(targetCal * 0.25 / 9);
        carbG = Math.round((targetCal - proteinG*4 - fatG*9) / 4);
        mode="lose";
        water= sex==="男"?2800:2300;
        steps=12000;
        tips="高蛋白中低碳水，少油少盐，大量蔬菜，有氧+力量训练";
    }else if(targetMode==="gain"){
        // 增重：热量盈余300kcal，高蛋白高碳水
        targetCal = tdee + 400;
        proteinG = Math.round(weight * 1.8);
        fatG = Math.round(targetCal * 0.25 / 9);
        carbG = Math.round((targetCal - proteinG*4 - fatG*9) / 4);
        mode="gain";
        water= sex==="男"?2800:2300;
        steps=7000;
        tips="增加优质蛋白和碳水摄入，配合力量训练增肌";
    }else{
        // shape 塑形增肌：BMI正常，目标是增肌减脂塑形
        targetCal = tdee + 200;  // 微盈余支持增肌
        proteinG = Math.round(weight * 1.8);  // 高蛋白
        fatG = Math.round(targetCal * 0.25 / 9);
        carbG = Math.round((targetCal - proteinG*4 - fatG*9) / 4);
        mode="shape";
        water= sex==="男"?2500:2100;
        steps=10000;
        tips="均衡营养高蛋白，重点力量训练雕刻线条，适量有氧";
    }
    sleep= age<30?8:7.5;
    return {bmr, tdee, targetCal, proteinG, fatG, carbG, mode, water, steps, sleep, tips};
}

// 根据目标热量和模式选择三餐
function getMealPlan(nutrition, seed){
    const bfCal = Math.round(nutrition.targetCal * 0.30);
    const lcCal = Math.round(nutrition.targetCal * 0.40);
    const dnCal = Math.round(nutrition.targetCal * 0.30);

    // 根据模式选择对应的餐食池
    const pool = MEAL_POOL;
    const mode = nutrition.mode; // lose/shape/gain

    // 按seed直接选（而非总是选最接近的），让"换一批"真正换
    function pickRotating(list, target, offset){
        // 按与目标热量的差距排序
        const sorted = [...list].map((item,i)=>({item,i,score:Math.abs(item.baseCal-target)}))
            .sort((a,b)=>a.score-b.score);
        // 取前4个最接近的作为候选池，按seed轮换选择
        const poolSize = Math.min(4, sorted.length);
        const idx = Math.abs(seed+offset) % poolSize;
        return sorted[idx].item;
    }

    const bf = pickRotating(pool.breakfast[mode], bfCal, 0);
    const lc = pickRotating(pool.lunch[mode], lcCal, 2);
    const dn = pickRotating(pool.dinner[mode], dnCal, 4);

    return {
        bf:{...bf, cal:Math.max(bfCal-30, Math.min(bfCal+30, bf.baseCal))},
        lc:{...lc, cal:Math.max(lcCal-30, Math.min(lcCal+30, lc.baseCal))},
        dn:{...dn, cal:Math.max(dnCal-30, Math.min(dnCal+30, dn.baseCal))}
    };
}

// 匹配食物卡路里（最长关键词优先）
function matchFood(text){
    if(!text)return null;
    const t=text.toLowerCase();
    let best=null,bestKwLen=0;
    for(const f of FOOD_DB){
        for(const kw of f.kw){
            if(t.includes(kw.toLowerCase()) && kw.length>bestKwLen){
                best={...f,matchedKw:kw};
                bestKwLen=kw.length;
            }
        }
    }
    return best;
}
// 解析运动文字 "快跑30分钟" → {label, met, minutes, kcal}
function parseExercise(text, weightKg){
    if(!text)return null;
    const t=text;
    let best=null;
    let bestKwLen=0;
    // 找匹配的运动（优先匹配最长关键词，确保"慢跑">"跑"）
    for(const ex of EXERCISE_DB){
        for(const kw of ex.kw){
            if(t.includes(kw) && kw.length>bestKwLen){
                best={...ex,matchedKw:kw};
                bestKwLen=kw.length;
            }
        }
    }
    // 解析时间：支持"30分""30分钟""半小时""1小时""1h""1h30分""1.5小时"
    let minutes=0;
    const halfHour=t.match(/半(小时|个小时|h)/);
    if(halfHour)minutes=30;
    else{
        // X小时Y分钟
        const hm=t.match(/(\d+(?:\.\d+)?)\s*(小时|h|时)/);
        const mm=t.match(/(\d+)\s*(分钟|分|min)/);
        if(hm)minutes+=parseFloat(hm[1])*60;
        if(mm)minutes+=parseInt(mm[1]);
        // 单独数字+单位缺失，默认分钟
        if(!hm&&!mm){
            const justNum=t.match(/^(\d+)$/);
            if(justNum)minutes=parseInt(justNum[1]);
        }
    }
    if(!best&&minutes>0){
        best={label:"运动",met:4,matchedKw:""};
    }
    if(!best||minutes<=0)return null;
    const kcal=Math.round(best.met*weightKg*(minutes/60));
    return {label:best.label,met:best.met,minutes,kcal,matchedKw:best.matchedKw};
}

        const r=new FileReader();
        r.onload=()=>res(r.result);

}
function getWeightRange(height,shapeKey){
    const h=Number(height)/100;
    const s=SHAPE[shapeKey]||SHAPE.X;
    return [Number((s.minBmi*h*h).toFixed(1)),Number((s.maxBmi*h*h).toFixed(1))];
}
function calcBMR(weight,height,age,sex){
    if(sex==="男") return Math.round(10*weight+6.25*height-5*age+5);
    return Math.round(10*weight+6.25*height-5*age-161);
}
function calcStable(list,minW,maxW){
    let cnt=0;
    const arr=[...list].sort((a,b)=>a.d.localeCompare(b.d));
    for(let i=arr.length-1;i>=0;i--){
        if(Number(arr[i].w)>=minW&&Number(arr[i].w)<=maxW) cnt++;
        else break;
    }
    return cnt;
}
// 根据BMI判断当前最接近的身材类型
function getCurrentShape(bmi){
    if(bmi<18.5) return {key:"H",label:"偏瘦·H直筒",color:"#5dade2"};
    if(bmi<20) return {key:"S",label:"S曲线型",color:"#27ae60"};
    if(bmi<21) return {key:"X",label:"X沙漏型",color:"#27ae60"};
    if(bmi<22.5) return {key:"A",label:"A梨型",color:"#27ae60"};
    if(bmi<24) return {key:"H",label:"H直筒型",color:"#27ae60"};
    if(bmi<26) return {key:"H",label:"偏丰满·H型",color:"#f39c12"};
    if(bmi<28) return {key:"O",label:"O圆润型",color:"#e67e22"};
    return {key:"O",label:"肥胖·O圆润",color:"#e74c3c"};
}

function daySeed(dateStr){
    let h=0;
    for(let i=0;i<dateStr.length;i++) h=((h<<5)-h)+dateStr.charCodeAt(i)|0;
    return Math.abs(h);
}

// ===================== 健康进步指数 HPI (Health Progress Index) =====================
// 参考: WHO BMI标准, ACSM运动测试与处方指南(第11版), 中国居民膳食指南2022
// 满分100分，5个维度
function calcHPI(person, recordsAll, todayStr){
    const records = (recordsAll[person.id]||[]).slice().sort((a,b)=>a.d.localeCompare(b.d));
    const w = person.height/100;
    const [tMin,tMax] = getWeightRange(person.height, person.shape);
    const tMid = (tMin+tMax)/2;
    const last = records[records.length-1];
    if(!last) return {total:0,bmi:0,dims:{bmi:0,target:0,trend:0,consistency:0,streak:0},grade:"--",trendText:"暂无数据"};

    const curW = Number(last.w);
    const bmi = calcBMI(curW, person.height);

    // 维度1: BMI健康分 (30分) — WHO标准
    let bmiScore = 0;
    if(bmi>=18.5 && bmi<24) bmiScore=30;
    else if(bmi>=24 && bmi<26) bmiScore=22;
    else if(bmi>=26 && bmi<28) bmiScore=14;
    else if(bmi>=28 && bmi<32) bmiScore=6;
    else if(bmi>=32) bmiScore=0;
    else if(bmi>=17 && bmi<18.5) bmiScore=20;
    else if(bmi>=16 && bmi<17) bmiScore=10;
    else bmiScore=4;

    // 维度2: 目标达成分 (25分) — 距离目标的差距
    let targetScore=0;
    const inTarget = curW>=tMin && curW<=tMax;
    if(inTarget){
        targetScore=25;
    }else{
        let dist;
        if(curW>tMax) dist=curW-tMax;
        else dist=tMin-curW;
        if(dist<1) targetScore=22;
        else if(dist<2) targetScore=18;
        else if(dist<3) targetScore=14;
        else if(dist<5) targetScore=10;
        else if(dist<8) targetScore=6;
        else targetScore=2;
    }

    // 维度3: 趋势方向分 (20分) — 最近7天变化是否朝正确方向，速度是否健康(0.3-1kg/周)
    let trendScore=10;
    let trendText="";
    const recent7 = records.filter(r=>{
        const diff = Math.floor((new Date(todayStr)-new Date(r.d))/(86400000));
        return diff>=0 && diff<=7;
    });
    if(recent7.length>=2){
        const first = recent7[0];
        const last7 = recent7[recent7.length-1];
        const change = Number(last7.w) - Number(first.w);
        const days = Math.max(1, Math.floor((new Date(last7.d)-new Date(first.d))/(86400000))+1);
        const weeklyChange = change/days*7;

        const needLose = curW > tMax;
        const needGain = curW < tMin;
        const onTarget = inTarget;

        if(onTarget){
            // 目标范围内：稳定最好
            if(Math.abs(weeklyChange)<0.5) {trendScore=20;trendText="稳定保持";}
            else if(Math.abs(weeklyChange)<1) {trendScore=14;trendText="小幅波动";}
            else {trendScore=6;trendText="波动较大";}
        }else if(needLose){
            if(weeklyChange<=-0.3 && weeklyChange>=-1.2){trendScore=20;trendText="健康减脂中";}
            else if(weeklyChange<-1.2){trendScore=12;trendText="减得太快";}
            else if(weeklyChange<0){trendScore=14;trendText="缓慢下降";}
            else if(weeklyChange<0.3){trendScore=8;trendText="平台期";}
            else {trendScore=3;trendText="反弹中";}
        }else if(needGain){
            if(weeklyChange>=0.3 && weeklyChange<=1.2){trendScore=20;trendText="健康增重中";}
            else if(weeklyChange>1.2){trendScore=10;trendText="增得太快";}
            else if(weeklyChange>0){trendScore=14;trendText="缓慢上升";}
            else {trendScore=3;trendText="还在下降";}
        }
    }else{
        trendText="记录不足";
    }

    // 维度4: 坚持记录分 (15分) — 最近7天记录天数
    let consScore=0;
    const last7days = [];
    for(let i=0;i<7;i++){
        const d=new Date(todayStr);
        d.setDate(d.getDate()-i);
        const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
        last7days.push(ds);
    }
    let recDays=0;
    last7days.forEach(ds=>{if(records.find(r=>r.d===ds))recDays++});
    if(recDays>=7) consScore=15;
    else if(recDays>=6) consScore=13;
    else if(recDays>=5) consScore=11;
    else if(recDays>=4) consScore=8;
    else if(recDays>=3) consScore=5;
    else if(recDays>=2) consScore=3;
    else if(recDays>=1) consScore=1;
    else consScore=0;

    // 维度5: 连续达标分 (10分)
    let streakScore=0;
    const stable = calcStable(records,tMin,tMax);
    if(stable>=7) streakScore=10;
    else if(stable>=5) streakScore=8;
    else if(stable>=3) streakScore=5;
    else if(stable>=1) streakScore=2;
    else streakScore=0;

    const total = bmiScore+targetScore+trendScore+consScore+streakScore;
    let grade;
    if(total>=90) grade="S";
    else if(total>=80) grade="A";
    else if(total>=70) grade="B";
    else if(total>=60) grade="C";
    else if(total>=40) grade="D";
    else grade="E";

    return {
        total, bmi, grade, trendText,
        dims:{bmi:bmiScore,target:targetScore,trend:trendScore,consistency:consScore,streak:streakScore},
        curW, inTarget, dist:inTarget?0:(curW>tMax?+(curW-tMax).toFixed(1):+(tMin-curW).toFixed(1)),
        recDays, stable
    };
}

// ===================== 体重趋势图 =====================
function drawChart(canvasId,recordList,targetMin,targetMax,lineColor){
    const canvas=document.getElementById(canvasId);
    if(!canvas||recordList.length<2)return;
    const ctx=canvas.getContext("2d");
    const w=canvas.clientWidth||canvas.offsetWidth||600;
    const h=240;
    canvas.width=w;canvas.height=h;
    ctx.clearRect(0,0,w,h);
    const pad={left:40,right:20,top:20,bottom:30};
    const weights=recordList.map(r=>Number(r.w)).filter(Number.isFinite);
    let minY=Math.min(...weights,targetMin)-1;
    let maxY=Math.max(...weights,targetMax)+1;
    if(maxY===minY){maxY+=1;minY-=1}
    const plotH=h-pad.top-pad.bottom,plotW=w-pad.left-pad.right;
    const getY=v=>pad.top+plotH*(1-(v-minY)/(maxY-minY));

    ctx.strokeStyle="#f0f0f0";ctx.lineWidth=1;
    for(let i=0;i<=4;i++){
        const y=pad.top+plotH/4*i;
        ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(w-pad.right,y);ctx.stroke();
    }
    ctx.setLineDash([5,4]);ctx.strokeStyle="#365CAD";ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(pad.left,getY(targetMax));ctx.lineTo(w-pad.right,getY(targetMax));ctx.stroke();
    ctx.beginPath();ctx.moveTo(pad.left,getY(targetMin));ctx.lineTo(w-pad.right,getY(targetMin));ctx.stroke();
    ctx.setLineDash([]);

    const stepX=plotW/(recordList.length-1);
    ctx.fillStyle=lineColor+"18";
    ctx.beginPath();
    recordList.forEach((r,i)=>{
        const x=pad.left+i*stepX,y=getY(Number(r.w));
        i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.lineTo(pad.left+plotW,pad.top+plotH);
    ctx.lineTo(pad.left,pad.top+plotH);
    ctx.closePath();ctx.fill();

    ctx.strokeStyle=lineColor;ctx.lineWidth=2.5;ctx.beginPath();
    recordList.forEach((r,i)=>{
        const x=pad.left+i*stepX,y=getY(Number(r.w));
        i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.stroke();
    ctx.fillStyle=lineColor;
    recordList.forEach((r,i)=>{
        const x=pad.left+i*stepX,y=getY(Number(r.w));
        ctx.beginPath();ctx.arc(x,y,3.5,0,Math.PI*2);ctx.fill();
    });
}

    // ====== 录入体重（紧跟封面）======

    // ====== 健康评估警示卡片（移到排名榜前面）======

                </div>

        }else{
            html+=`<div class="health-alert ${alertClass}">
                <div class="health-icon">${icon}</div>
                <div class="health-content">
                    <div class="health-title">你现在是：${curShape.label} (BMI ${bmi})</div>
                    <div class="health-bmi">身高${active.height}cm · 体重${currentW}kg · ${active.age}岁${active.sex}</div>

        // BMI标尺
        const bmiPct = Math.max(0,Math.min(100,((bmi-15)/(35-15))*100));

    // ====== HPI 健康进步指数排名 ======
    const rankings = d.people.map(p=>{

    html+=`<div class="card ranking-card">

    rankings.forEach((r,i)=>{
        const rank=i+1;

        const h=r.hpi;

        const rankCls = `rank-${rank<=3?rank:'other'}`;
        let avScale=1;
        if(h.curW){
            const [pMin,pMax]=getWeightRange(r.person.height,r.person.shape);
            const pMid=(pMin+pMax)/2;

        html+=`<div class="rank-item ${rankCls} ${isActive?'active':''}" onclick="switchUser('${escapeHtml(r.person.id)}')">

                </div>
                <div class="rank-status">
                    ${h.curW?`${h.curW}kg · ${r.curShape.label} · `:""}${h.trendText}

                </div>
                <div class="rank-bar"><div class="rank-bar-fill" style="width:${h.total}%"></div></div>
                <div class="rank-dims">

                    <span class="rank-dim">目标${h.dims.target}/25</span>
                    <span class="rank-dim">趋势${h.dims.trend}/20</span>
                    <span class="rank-dim">坚持${h.dims.consistency}/15</span>
                    <span class="rank-dim">连续${h.dims.streak}/10</span>
                </div>
            </div>
            <div class="rank-score">
                <div class="rank-score-num">${h.total}</div>
                <div class="rank-score-label">/100分</div>
            </div>
        </div>`;
    });
    html+=`</div>
        <div style="margin-top:10px;font-size:11px;color:#aaa;line-height:1.5">
            评分依据：BMI健康(30)+目标达成(25)+趋势方向(20)+记录坚持(15)+连续达标(10)。S≥90, A≥80, B≥70, C≥60, D≥40
        </div>
    </div>`;

    // HPI依据弹窗
    if(state.showHpiModal){
        html+=`<div class="modal-overlay" onclick="closeHpiModal()">
            <div class="modal-box" onclick="event.stopPropagation()">
                <div class="modal-hdr">
                    <h3>HPI 健康进步指数 · 评分依据</h3>
                    <button class="modal-close" onclick="closeHpiModal()">×</button>
                </div>
                <div class="modal-section">
                    <h4>📐 BMI健康分（30分）— 参考WHO标准</h4>
                    <p>依据世界卫生组织(WHO)《Global Health Observatory》BMI分类标准：</p>
                    <ul>
                        <li>BMI 18.5-23.9（正常）→ 30分满分</li>
                        <li>BMI 24-25.9（超重前期）→ 22分</li>
                        <li>BMI 26-27.9（超重）→ 14分</li>
                        <li>BMI 28-31.9（肥胖）→ 6分</li>
                        <li>BMI ≥32（重度肥胖）→ 0分</li>
                        <li>偏瘦(BMI<18.5)相应扣分</li>
                    </ul>
                    <div class="modal-cite">来源：WHO Obesity and Overweight Fact Sheet (2024)</div>
                </div>
                <div class="modal-section">
                    <h4>🎯 目标达成分（25分）— 基于理想身材区间</h4>
                    <p>根据用户选择的理想身材类型（S/X/H/A/O曲线），计算出对应BMI区间下的体重范围，距离目标越近得分越高：</p>
                    <ul>
                        <li>体重落在理想区间内 → 25分满分</li>
                        <li>距离目标<1kg → 22分</li>
                        <li>距离目标<2kg → 18分</li>
                        <li>距离目标<3kg → 14分</li>
                        <li>距离目标<5kg → 10分</li>
                    </ul>
                </div>
                <div class="modal-section">
                    <h4>📈 趋势方向分（20分）— ACSM运动医学指南</h4>
                    <p>依据美国运动医学会(ACSM)《ACSM's Guidelines for Exercise Testing and Prescription》第11版推荐的安全减重/增重速度：</p>
                    <ul>
                        <li>健康速度0.3-1.2kg/周 → 20分满分</li>
                        <li>速度过快(>1.2kg/周)有健康风险 → 10-12分</li>
                        <li>方向正确但缓慢 → 14分</li>

                    <div class="modal-cite">来源：ACSM's Guidelines for Exercise Testing and Prescription, 11th Ed. (2021)</div>
                </div>

                    <ul>
                        <li>最近7天全部记录 → 15分满分</li>

    // ====== 每日营养目标 ======
    if(nutrition){
        html+=`<div class="card">

                <div class="daily-target"><div class="dt-val">${nutrition.targetCal}</div><div class="dt-label">热量 kcal</div></div>

                <div class="daily-target"><div class="dt-val">${nutrition.fatG}g</div><div class="dt-label">脂肪</div></div>
                <div class="daily-target"><div class="dt-val">${nutrition.water/1000}L</div><div class="dt-label">饮水</div></div>
                <div class="daily-target"><div class="dt-val">${(nutrition.steps/1000).toFixed(0)}k</div><div class="dt-label">步数</div></div>
            </div>
        </div>`;
    }

    // ====== 饮食 & 运动记录 ======
    const todayKey = state.inputDate || today();
    const dietList = (state.data.diet && state.data.diet[state.activeId] && state.data.diet[state.activeId][todayKey]) || [];
    const exList = (state.data.exercise && state.data.exercise[state.activeId] && state.data.exercise[state.activeId][todayKey]) || [];
    const totalEat = dietList.reduce((s,i)=>s+(i.kcal||0),0);
    const totalBurn = exList.reduce((s,i)=>s+(i.kcal||0),0);
    const remain = nutrition ? (nutrition.targetCal - totalEat + totalBurn) : 0;
    const remainColor = !nutrition?"#999":(remain<0?"#d03333":remain<nutrition.targetCal*0.2?"#e67e22":"#2F6B4F");

    html+=`<div class="log-section">

            ${state.foodImg?`<div class="log-preview"><img src="${state.foodImg}" alt=""><span>已选图片</span><button class="log-item-del" onclick="state.foodImg=null;render()">×</button></div>`:""}
            <div id="foodMatchHint"></div>
            <div class="log-list">
                ${dietList.length===0?`<div style="color:#bbb;font-size:12px;padding:20px 0;text-align:center">今天还没记录饮食，拍照或输入食物名称开始记录吧</div>`:
                dietList.map((f,idx)=>`<div class="log-item">
                    ${f.img?`<img src="${f.img}">`:"<div style='width:36px;height:36px;background:#f5f5f5;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0'>🍴</div>"}
                    <div class="log-item-info">
                        <div class="log-item-name">${escapeHtml(f.name)}</div>
                        <div class="log-item-meta">${f.time||""}</div>

                    <div class="log-item-kcal">${f.kcal}kcal</div>
                    <button class="log-item-del" onclick="delFood(${idx})">×</button>
                </div>`).join("")}
            </div>
            <div class="log-sum">
                <span>今日摄入</span><b>${totalEat} kcal</b>
            </div>
        </div>

        <!-- 运动记录 -->
        <div class="log-card">
            <h3>🏃 运动记录</h3>
            <div class="log-input-row">
                <input id="exInput" placeholder="如：快跑30分、游泳1小时" value="${escapeHtml(state.exInput)}" oninput="state.exInput=this.value;exAutoMatch()">

            <div class="log-input-row">

            ${state.exImg?`<div class="log-preview"><img src="${state.exImg}" alt=""><span>已选图片</span><button class="log-item-del" onclick="state.exImg=null;render()">×</button></div>`:""}
            <div id="exMatchHint"></div>
            <div class="log-list">
                ${exList.length===0?`<div style="color:#bbb;font-size:12px;padding:20px 0;text-align:center">输入运动如"快跑30分钟"自动计算消耗</div>`:
                exList.map((e,idx)=>`<div class="log-item">
                    ${e.img?`<img src="${e.img}">`:"<div style='width:36px;height:36px;background:#f5f5f5;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0'>💪</div>"}
                    <div class="log-item-info">
                        <div class="log-item-name">${escapeHtml(e.name)}</div>
                        <div class="log-item-meta">${e.minutes}分钟 · MET ${e.met}</div>
                    </div>
                    <div class="log-item-kcal">-${e.kcal}kcal</div>
                    <button class="log-item-del" onclick="delEx(${idx})">×</button>
                </div>`).join("")}
            </div>
            <div class="log-sum">
                <span>今日消耗</span><b>-${totalBurn} kcal</b>
            </div>
        </div>
    </div>
    `;

    // 净卡路里平衡展示（替代旧卡路里计算器，数据来自饮食运动记录）
    if(nutrition){
        const netIn = totalEat - totalBurn;
        const bmrKcal = nutrition.bmr;
        const totalConsume = bmrKcal + totalBurn;
        const inPct = Math.min(150, (totalEat/nutrition.targetCal)*100);
        let balText="",balIcon="⚖️";
        if(totalEat===0){balText="还没记录饮食，拍照或输入食物名称开始记录吧";balIcon="🍽️"}
        else if(remain<0){balText=`已超目标 ${Math.abs(remain)}kcal，建议增加运动或减少摄入`;balIcon="⚠️"}
        else if(remain<nutrition.targetCal*0.2){balText=`接近今日上限，注意控制`;balIcon="👀"}
        else{balText=`还可摄入 ${remain}kcal，继续加油`;balIcon="✅"}
        html+=`<div class="card">
            <h2>今日卡路里 <span style="font-size:12px;color:#999;font-weight:400">· 目标 ${nutrition.targetCal}kcal</span></h2>
            <div style="display:flex;justify-content:space-between;font-size:13px;color:#666;margin-bottom:6px">
                <span>已摄入 <b style="color:#333">${totalEat}kcal</b></span>
                <span>基础代谢 ${bmrKcal} + 运动 ${totalBurn} = 共消耗 <b style="color:#333">${totalConsume}kcal</b></span>
            </div>
            <div class="calc-bar" style="margin-bottom:10px">
                <div class="calc-bar-fill" style="width:${Math.min(100,inPct)}%;background:${inPct>100?'#d03333':inPct>80?'#f39c12':'#2F6B4F'}"></div>

                <div class="cal-balance-icon">${balIcon}</div>

                    <div class="cal-balance-sub">净摄入 ${netIn}kcal · 目标 ${nutrition.targetCal}kcal${totalBurn>0?` · 运动额外消耗${totalBurn}kcal`:""}</div>
                    <div style="margin-top:4px;color:#555">${balText}</div>
                </div>
            </div>
        </div>`;
    }

    // ====== 身材进度可视化 ======
    if(currentW!=null){
        let curScale=1;
        if(currentW>tMax){
            const overRatio=(currentW-tMax)/tMax;
            curScale=1+overRatio*1.2;
        }else if(currentW<tMin){
            const underRatio=(tMin-currentW)/tMin;
            curScale=1-underRatio*0.8;
        }
        curScale=Math.max(0.75,Math.min(1.35,curScale));

        const modeText = nutrition?(nutrition.mode==="lose"?"减脂":nutrition.mode==="gain"?"增肌增重":"塑形增肌"):"";
        const actionText = currentW>tMax
            ? `再减 <strong>${toGo}kg</strong> 就能达到理想${shapeInfo.name}身材！按每周减0.5-1kg的健康速度，预计 <strong>${Math.ceil(toGo/0.75)}-${Math.ceil(toGo/0.5)}</strong> 周达成目标`
            : currentW<tMin
            ? `需增重 <strong>${toGo}kg</strong>，增加蛋白质和优质碳水，配合力量训练增肌`
            : `恭喜！你已是${shapeInfo.name}身材，当前<b>${modeText}</b>阶段，重点通过力量训练雕刻身体线条`;

        html+=`<div class="card">
            <h2>身材变化对比</h2>
            <div class="progress-visual">
                <div class="progress-figure fig-current">
                    ${shapeSvg(active.shape,60,active.color+"66",curScale)}
                    <div class="fig-weight">${currentW}kg</div>
                    <div class="fig-label">现在 · ${currentShapeLabel}</div>
                </div>
                <div class="progress-arrow">→</div>
                <div class="progress-figure fig-target">
                    ${shapeSvg(active.shape,60,active.color,1)}
                    <div class="fig-weight">${tMid.toFixed(1)}kg</div>
                    <div class="fig-label">目标${shapeInfo.name}</div>
                </div>
            </div>
            <div class="progress-detail">${actionText}</div>
        </div>`;
    }

    // ====== 三餐推荐（个性化）======
    if(nutrition){
        const seed=daySeed(dateStr)+active.id.charCodeAt(0)+(state.data.mealSeed||0);
        const plan=getMealPlan(nutrition,seed);
        const totalRecCal=plan.bf.cal+plan.lc.cal+plan.dn.cal;

        const modeLabel = nutrition.mode==="lose"?"减脂方案":nutrition.mode==="gain"?"增重增肌方案":"塑形增肌方案";
        const modeEmoji = nutrition.mode==="lose"?"🔥":nutrition.mode==="gain"?"💪":"✨";

        function macroTags(m){
            return `<div class="meal-macros">
                <span class="macro-tag protein">蛋白${m.protein}g</span>
                <span class="macro-tag carbs">碳水${m.carb}g</span>
                <span class="macro-tag fat">脂肪${m.fat}g</span>
                <span class="macro-tag cal">${m.cal}kcal</span>
            </div>`;
        }

        html+=`<div class="card">
            <h2>${modeEmoji} 今日推荐餐 <span style="font-size:12px;color:#999;font-weight:400">· ${modeLabel} · 三餐约${totalRecCal}kcal</span></h2>
            <div style="font-size:12px;color:#888;margin-bottom:6px">基于你的年龄${active.age}岁、身高${active.height}cm、体重${currentW}kg、${active.sex==="女"?"女性":"男性"}，每日目标：蛋白${nutrition.proteinG}g · 碳水${nutrition.carbG}g · 脂肪${nutrition.fatG}g</div>
            <div class="meal-day">
                <div class="meal-card">
                    <div class="meal-type"><span class="meal-icon">🌅</span>早餐 · 30%</div>
                    <div class="meal-name">${plan.bf.name}</div>
                    <div class="meal-desc">${plan.bf.desc}</div>
                    ${macroTags(plan.bf)}
                    <div class="meal-actions"><button class="btn-main btn-sm" onclick="applyRecCal('breakfast',${plan.bf.cal})">记录</button></div>
                </div>
                <div class="meal-card">
                    <div class="meal-type"><span class="meal-icon">☀️</span>午餐 · 40%</div>
                    <div class="meal-name">${plan.lc.name}</div>
                    <div class="meal-desc">${plan.lc.desc}</div>
                    ${macroTags(plan.lc)}
                    <div class="meal-actions"><button class="btn-main btn-sm" onclick="applyRecCal('lunch',${plan.lc.cal})">记录</button></div>
                </div>
                <div class="meal-card">
                    <div class="meal-type"><span class="meal-icon">🌙</span>晚餐 · 30%</div>
                    <div class="meal-name">${plan.dn.name}</div>
                    <div class="meal-desc">${plan.dn.desc}</div>
                    ${macroTags(plan.dn)}
                    <div class="meal-actions"><button class="btn-main btn-sm" onclick="applyRecCal('dinner',${plan.dn.cal})">记录</button></div>
                </div>
            </div>
            <div style="margin-top:10px">
                <button class="btn-gray btn-sm" onclick="shuffleMeals()">🔄 换一批</button>
                <button class="btn-main btn-sm" onclick="applyAllRec(${plan.bf.cal},${plan.lc.cal},${plan.dn.cal})">一键记录全部</button>
            </div>
            <div style="margin-top:10px;padding:10px;background:#f8faf9;border-radius:8px;font-size:12px;color:#666;line-height:1.6">
                <b>${nutrition.mode==="lose"?"减脂小贴士":nutrition.mode==="gain"?"增肌小贴士":"塑形小贴士"}：</b>${nutrition.tips}。每日饮水${nutrition.water}ml，蔬菜不少于500g，${nutrition.mode==="lose"?"烹饪少油少盐，晚餐19点前完成，每周5次有氧+2次力量训练":nutrition.mode==="gain"?"训练后30分钟内补充蛋白质和碳水，保证充足睡眠8小时，每周4-5次力量训练":"每周4次力量训练+2-3次有氧，重点训练薄弱部位，蛋白质均匀分配到三餐"}。
            </div>
        </div>`;
    }

    // ====== 体重趋势 ======
    html+=`<div class="card"><h2>体重趋势</h2>`;
    if(records.length<2){
        html+="<p style='color:#bbb;font-size:13px'>至少两条记录显示曲线</p>";
    }else{
        html+=`<canvas id="chartMain"></canvas>`;
        setTimeout(()=>drawChart("chartMain",records,tMin,tMax,active.color),0);
    }
    html+="</div>";

    // ====== 历史记录 ======
    if(records.length>0){
        html+=`<div class="card"><h2>历史记录</h2><table><thead><tr><th>日期</th><th>体重</th><th>BMI</th><th>状态</th><th></th></tr></thead><tbody>`;
        [...records].reverse().forEach(r=>{
            const w=Number(r.w);
            const bmi=calcBMI(w,active.height);
            const bi=getBMIInfo(bmi);
            const inR=w>=tMin&&w<=tMax;
            html+=`<tr>
                <td>${escapeHtml(r.d)}</td>
                <td><b>${escapeHtml(r.w)}</b>kg</td>
                <td style="color:${bi.color}">${bmi}</td>
                <td>${inR?"<span style='color:#227043'>✓ 达标</span>":w>tMax?`<span style="color:${bi.color}">${bi.level}</span>`:`<span style="color:#486da8">${bi.level}</span>`}</td>
                <td><button class="btn-gray btn-sm" onclick="delRec('${escapeHtml(r.d)}')">删除</button></td>
            </tr>`;
        });
        html+="</tbody></table></div>";
    }

    // 编辑面板已移至顶部

    html+=`<footer>连续${STABLE_TARGET}天落在理想身材区间即为塑形成功 · 数据保存在本地浏览器 · 健康减肥 每周0.5-1kg</footer>`;
    app.innerHTML=html;
}

// ===================== 交互 =====================
window.switchUser=function(id){state.activeId=id;state.inputDate=today();state.inputWeight="";render()};
window.openAdd=function(){state.edit=true;state.draft={id:null,name:"",age:"",height:"",sex:"女",shape:"X"};render()};
window.editUser=function(id){const u=state.data.people.find(p=>p.id===id);if(!u)return;state.edit=true;state.draft={...u};render()};
window.closeEdit=function(){state.edit=false;state.draft=null;render()};
window.draftSet=function(k,v){state.draft[k]=v};
window.pickShape=function(k){state.draft.shape=k;render()};
window.saveDraft=function(){
    const d=state.draft;const age=+d.age,ht=+d.height;
    if(!String(d.name).trim()||!isFinite(age)||!isFinite(ht)){showTip("请填完整信息");return}
    if(age<1||age>120||ht<50||ht>250){showTip("年龄或身高数值错误");return}
    const nd=cloneData(state.data);
    if(d.id){
        nd.people=nd.people.map(p=>p.id===d.id?{...p,...d,name:String(d.name).trim(),age,height:ht}:p);
    }else{
        const nid="u"+Date.now();
        nd.people.push({id:nid,name:String(d.name).trim(),age,height:ht,sex:d.sex,shape:d.shape||"X",color:COLORS[nd.people.length%COLORS.length]});
        nd.records[nid]=[];state.activeId=nid;
    }
    save(nd);state.data=nd;state.edit=false;showTip("保存成功");render();
};
window.delUser=function(id){
    if(!confirm("确定删除该成员所有数据？"))return;
    const nd=cloneData(state.data);
    delete nd.records[id];
    Object.keys(nd.meals).forEach(k=>{if(k.endsWith("_"+id))delete nd.meals[k]});
    nd.people=nd.people.filter(p=>p.id!==id);
    save(nd);state.data=nd;state.activeId=nd.people[0]?.id||"";state.edit=false;render();
};
window.formDate=function(v){state.inputDate=v;render()};
window.formW=function(v){state.inputWeight=v};
window.saveRec=function(){
    const w=parseFloat(state.inputWeight);
    if(!state.inputDate){showTip("请选择日期");return}
    if(isNaN(w)||w<10||w>300){showTip("体重数值错误");return}
    const nd=cloneData(state.data);
    if(!nd.records[state.activeId])nd.records[state.activeId]=[];
    const list=nd.records[state.activeId].filter(r=>r.d!==state.inputDate);
    list.push({d:state.inputDate,w:+w.toFixed(1)});
    list.sort((a,b)=>a.d.localeCompare(b.d));
    nd.records[state.activeId]=list;
    save(nd);state.data=nd;state.inputWeight="";showTip("记录已存");render();
};
window.delRec=function(date){
    const nd=cloneData(state.data);
    nd.records[state.activeId]=(nd.records[state.activeId]||[]).filter(r=>r.d!==date);
    save(nd);state.data=nd;render();
};

window.setMeal=function(k,v){
    const m=getMeals(state.activeId,state.inputDate);
    m[k]=v===""?0:(Number(v)||0);
    setMeals(state.activeId,state.inputDate,m);
    updateCalcDisplay();
};
function updateCalcDisplay(){
    const active=state.data.people.find(p=>p.id===state.activeId);
    if(!active)return;
    const records=(state.data.records[active.id]||[]).sort((a,b)=>a.d.localeCompare(b.d));
    const lastRec=records[records.length-1];
    const todayRec=records.find(r=>r.d===state.inputDate);
    const currentW=todayRec?+todayRec.w:(lastRec?+lastRec.w:null);
    if(currentW==null)return;
    const meals=getMeals(active.id,state.inputDate);
    const bmr=calcBMR(currentW,active.height,active.age,active.sex);
    const bmi=calcBMI(currentW,active.height);
    let nutMode;
    if(bmi<18.5) nutMode="gain";
    else if(bmi>=24) nutMode="lose";
    else nutMode="shape";
    const nut=calcNutrition(currentW,active.height,active.age,active.sex,nutMode);
    const actFactor = nutMode==="shape"?1.55:1.375;
    const act=Math.round(bmr*(actFactor-1));
    const tin=+(meals.breakfast||0) + +(meals.lunch||0) + +(meals.dinner||0) + +(meals.snack||0);
    const tout=Math.round(bmr*actFactor) + +(meals.exercise||0);
    const rem=tin-tout;
    const overCal = Math.max(0, tin - nut.targetCal);
    const remainCal = Math.max(0, nut.targetCal - tin);
    const pct=nut.targetCal>0?Math.min(100,(tin/nut.targetCal)*100):0;

    const cards=document.querySelectorAll(".calc-result");
    if(cards.length===0)return;
    const cr=cards[0];
    const rows=cr.querySelectorAll(".calc-result-row");
    if(rows.length>=3){
        rows[0].querySelectorAll("span")[1].textContent=`${tin} / ${nut.targetCal}kcal`;
        rows[1].querySelectorAll("span")[1].textContent=tout+"kcal";
        const big=rows[2];
        big.classList.toggle("over",tin>nut.targetCal);
        if(tin<=nut.targetCal){
            big.querySelectorAll("span")[0].textContent=`还可摄入 ${remainCal}kcal`;
        }else{
            big.querySelectorAll("span")[0].textContent=`已超 ${overCal}kcal！`;
        }
        big.querySelector(".val").textContent=(tin>nut.targetCal?"+":"")+(tin-tout);
    }
    const bar=cr.querySelector(".calc-bar-fill");
    if(bar){
        bar.style.width=pct+"%";
        bar.style.background=pct>100?"#d03333":pct>80?"#f39c12":"#2F6B4F";
    }
    const tip=cr.querySelector(".calc-tip");
    if(tip){
        if(tin===0) tip.textContent="记录你的三餐热量，科学管理每日摄入";
        else if(pct>100) tip.textContent="⚠️ 今日热量已超标！建议减少摄入或增加运动消耗";
        else if(pct>85) tip.textContent="接近目标，注意不要再吃零食了";
        else if((tout-tin)<-500) tip.textContent="缺口较大，注意不要过度节食";
        else tip.textContent="进度良好，保持均衡营养搭配";
    }
}
window.applyRecCal=function(type,cal){
    const m=getMeals(state.activeId,state.inputDate);
    m[type]=cal;
    setMeals(state.activeId,state.inputDate,m);
    render();
};
window.applyAllRec=function(bf,lc,dn){
    const m=getMeals(state.activeId,state.inputDate);
    m.breakfast=bf;m.lunch=lc;m.dinner=dn;
    setMeals(state.activeId,state.inputDate,m);
    showTip("已记录三餐热量");
    render();
};
window.shuffleMeals=function(){
    state.data.mealSeed=(state.data.mealSeed||0)+1;
    save(state.data);
    render();
};
window.openHpiModal=function(){
    state.showHpiModal=true;
    render();
};
window.closeHpiModal=function(){
    state.showHpiModal=false;
    render();
};

// ====== 饮食记录 ======
window.foodAutoMatch=function(){
    const val=document.getElementById("foodNameInput")?.value||"";
    const hint=document.getElementById("foodMatchHint");
    const calInput=document.getElementById("foodCalInput");
    const m=matchFood(val);
    if(m){
        if(hint)hint.innerHTML=`<div class="log-match">识别到：${m.matchedKw} · ${m.unit}约 ${m.unitKcal}kcal（每100g ${m.kcal}kcal）<button class="log-btn log-btn-cam" style="margin-left:6px;padding:2px 8px;font-size:11px" onclick="useFoodHint(${m.unitKcal})">填入</button></div>`;
    }else{
        if(hint)hint.innerHTML="";
    }
};
window.useFoodHint=function(kcal){
    state.foodCal=kcal;
    const calInput=document.getElementById("foodCalInput");
    if(calInput)calInput.value=kcal;
    render();
};
window.handleFoodImg=async function(ev){
    const f=ev.target.files&&ev.target.files[0];
    if(!f)return;
    const url=await fileToDataUrl(f);
    state.foodImg=url;
    // 简单提示：纯前端无法做AI识别，需手动输入卡路里
    showTip("图片已添加，请输入食物名称和卡路里");
    render();
    setTimeout(()=>{const inp=document.getElementById("foodNameInput");if(inp)inp.focus()},100);
};
window.addFood=function(){
    const name=state.foodInput.trim();
    let kcal=parseInt(state.foodCal);
    if(!name){showTip("请输入食物名称");return}
    if(!kcal||kcal<=0){
        const m=matchFood(name);
        if(m)kcal=m.unitKcal;
        else{showTip("请输入卡路里或选择常见食物");return}
    }
    const nd=cloneData(state.data);
    if(!nd.diet[state.activeId])nd.diet[state.activeId]={};
    const tk=state.inputDate||today();
    if(!nd.diet[state.activeId][tk])nd.diet[state.activeId][tk]=[];
    const now=new Date();
    const time=`${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
    nd.diet[state.activeId][tk].push({name,kcal,img:state.foodImg,time});
    state.data=nd;save(nd);
    state.foodInput="";state.foodCal="";state.foodImg=null;
    showTip("已记录 "+name+" "+kcal+"kcal");
    render();
};
window.delFood=function(idx){
    const nd=cloneData(state.data);
    const tk=state.inputDate||today();
    if(nd.diet[state.activeId]&&nd.diet[state.activeId][tk]){
        nd.diet[state.activeId][tk].splice(idx,1);
        state.data=nd;save(nd);render();
    }
};

// ====== 运动记录 ======
function getCurWeight(){
    const recs=(state.data.records[state.activeId]||[]);
    if(recs.length)return recs[recs.length-1].w;
    return 65;
}
window.exAutoMatch=function(){
    const val=document.getElementById("exInput")?.value||"";
    const hint=document.getElementById("exMatchHint");
    const w=getCurWeight();
    const r=parseExercise(val,w);
    if(r){
        state.exResult=r;
        if(hint)hint.innerHTML=`<div class="log-match">识别到：${r.label} ${r.minutes}分钟（MET ${r.met}）· 预计消耗 <b>${r.kcal}kcal</b></div>`;
    }else{
        state.exResult=null;
        if(hint)hint.innerHTML="";
    }
};
window.handleExImg=async function(ev){
    const f=ev.target.files&&ev.target.files[0];
    if(!f)return;
    const url=await fileToDataUrl(f);
    state.exImg=url;
    showTip("图片已添加，输入运动内容（如：快跑30分）");
    render();
    setTimeout(()=>{const inp=document.getElementById("exInput");if(inp)inp.focus()},100);
};
window.addExercise=function(){
    const text=state.exInput.trim();
    if(!text){showTip("请输入运动内容");return}
    const w=getCurWeight();
    const r=parseExercise(text,w);
    if(!r){showTip("无法识别，请写清楚如\"快跑30分\"");return}
    const nd=cloneData(state.data);
    if(!nd.exercise[state.activeId])nd.exercise[state.activeId]={};
    const tk=state.inputDate||today();
    if(!nd.exercise[state.activeId][tk])nd.exercise[state.activeId][tk]=[];
    const now=new Date();
    const time=`${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
    nd.exercise[state.activeId][tk].push({name:text,minutes:r.minutes,met:r.met,kcal:r.kcal,img:state.exImg,time});
    state.data=nd;save(nd);
    state.exInput="";state.exResult=null;state.exImg=null;
    showTip(`已记录 ${r.label} ${r.minutes}分钟 消耗${r.kcal}kcal`);
    render();
};
window.delEx=function(idx){
    const nd=cloneData(state.data);
    const tk=state.inputDate||today();
    if(nd.exercise[state.activeId]&&nd.exercise[state.activeId][tk]){
        nd.exercise[state.activeId][tk].splice(idx,1);
        state.data=nd;save(nd);render();
    }
};

// ===================== 初始化 =====================
function init(){
    const local=load();
    if(local&&Array.isArray(local.people)&&local.records){
        state.data=local;
        if(!state.data.meals)state.data.meals={};
        if(!state.data.diet) state.data.diet={};
        if(!state.data.exercise) state.data.exercise={};
        if(state.data.mealSeed==null)state.data.mealSeed=0;
        state.data.people.forEach(p=>{
            if(!state.data.records[p.id])state.data.records[p.id]=[];
        });
        state.activeId=local.people[0]?.id||"";
    }else{
        state.data=cloneData(initData);
        state.data.diet={};
        state.data.exercise={};
        save(state.data);
        state.activeId=state.data.people[0]?.id||"";
    }
    state.loading=false;
    state.inputDate=today();
    render();
}
window.addEventListener("resize",()=>{
    const a=state.data?.people.find(p=>p.id===state.activeId);if(!a)return;
    const rs=state.data.records[a.id]||[];if(rs.length<2)return;
    const [mn,mx]=getWeightRange(a.height,a.shape);
    drawChart("chartMain",rs,mn,mx,a.color);
});
init();
</script>
